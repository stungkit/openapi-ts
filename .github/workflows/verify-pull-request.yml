name: Verify pull request

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: verify-pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify-pull-request:
    if: github.repository == 'hey-api/hey-api' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GIT_APP_CLIENT_ID }}
          private-key: ${{ secrets.GIT_APP_PRIVATE_KEY }}

      - name: Verify pull request description
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npx --yes tsx scripts/verify-pull-request.ts
